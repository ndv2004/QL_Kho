<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ea8ec7" />
    <title>Quản Lý Kho Công Ty Quang Vinh</title>
    <link rel="icon" type="image/jpeg" href="./img/logo2.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar d-none d-lg-flex flex-column">
        <div class="brand">
          <div class="brand-mark">
            <img src="./img/quangvinh.jpg" alt="Logo" />
          </div>
          <div>
            <div class="brand-title">Quang Vinh</div>
            <div class="brand-subtitle">Tạ Khánh Ly Quản Lý Kho</div>
          </div>
        </div>
        <nav class="nav flex-column mt-3" id="desktopNav"></nav>
        <div class="mt-auto p-3 small text-muted">
          <div id="desktopUserBox">Chưa đăng nhập quản lý</div>
        </div>
      </aside>

      <div
        class="offcanvas offcanvas-start sidebar-mobile"
        tabindex="-1"
        id="mobileSidebar"
      >
        <div class="offcanvas-header">
          <div class="brand">
            <div class="brand-mark">
              <img src="./img/quangvinh.jpg" alt="Logo" />
            </div>
            <div>
              <div class="brand-title">Quang Vinh</div>
              <div class="brand-subtitle">Tạ Khánh Ly Quản Lý Kho</div>
            </div>
          </div>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Đóng"
          ></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
          <nav class="nav flex-column" id="mobileNav"></nav>
          <div class="mt-auto small text-muted" id="mobileUserBox"></div>
        </div>
      </div>

      <main class="main-panel">
        <header class="topbar">
          <div class="d-flex align-items-center gap-2 topbar-title-wrap">
            <button
              class="btn btn-soft d-lg-none mobile-menu-btn"
              data-bs-toggle="offcanvas"
              data-bs-target="#mobileSidebar"
              aria-label="Mở menu"
            >
              <i class="bi bi-list"></i>
            </button>
            <div>
              <h1 id="pageTitle" class="page-title mb-1">Dashboard</h1>
              <div id="pageSubtitle" class="page-subtitle">
                Tổng quan hệ thống
              </div>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="btn btn-light" id="btnRefresh">
              <i class="bi bi-arrow-clockwise me-1"></i> Tải lại
            </button>
            <button class="btn btn-soft" id="btnLogin">
              <i class="bi bi-person-lock me-1"></i> Đăng nhập
            </button>
            <button class="btn btn-outline-danger d-none" id="btnLogout">
              <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
            </button>
          </div>
        </header>

        <section class="content-wrap">
          <div id="publicBanner" class="alert alert-soft mb-4 d-none">
            Người xem chỉ có quyền tra cứu sản phẩm. Chỉ có Tạ khánh Ly mới có
            quyền truy cập để sửa
          </div>

          <div id="dashboardPage" class="page-section"></div>
          <div id="productsPage" class="page-section d-none"></div>
          <div id="suppliersPage" class="page-section d-none"></div>
          <div id="customersPage" class="page-section d-none"></div>
          <div id="importsPage" class="page-section d-none"></div>
          <div id="salesPage" class="page-section d-none"></div>
          <div id="invoicesPage" class="page-section d-none"></div>
          <div id="reportsPage" class="page-section d-none"></div>
        </section>
      </main>
    </div>

    <div class="modal fade" id="entityModal" tabindex="-1" aria-hidden="true">
      <div
        class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down"
      >
        <div class="modal-content" id="entityModalContent"></div>
      </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content" id="confirmModalContent"></div>
      </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
      <div
        class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-md-down"
      >
        <div class="modal-content" id="detailModalContent"></div>
      </div>
    </div>

    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content" id="loginModalContent"></div>
      </div>
    </div>

    <script src="/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
